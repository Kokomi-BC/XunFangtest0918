version : '3.8'
services:
  xunfang-nacos:
    container_name: xunfang-nacos
    image: nacos/nacos-server
    build:
      context: ./nacos
    environment:
      - MODE=standalone
    volumes:
      - ./nacos/logs/:/home/nacos/logs
      - ./nacos/conf/application.properties:/home/nacos/conf/application.properties
    ports:
      - "8848:8848"
      - "9848:9848"
      - "9849:9849"
    depends_on:
      - xunfang-mysql
  xunfang-mysql:
    container_name: xunfang-mysql
    image: mysql:5.7
    build:
      context: ./mysql
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/conf:/etc/mysql/conf.d
      - ./mysql/logs:/logs
      - ./mysql/data:/var/lib/mysql
    command: [
          'mysqld',
          '--innodb-buffer-pool-size=80M',
          '--character-set-server=utf8mb4',
          '--collation-server=utf8mb4_unicode_ci',
          '--default-time-zone=+8:00',
          '--lower-case-table-names=1'
        ]
    environment:
      MYSQL_DATABASE: 'ry-cloud'
      MYSQL_ROOT_PASSWORD: password
  xunfang-redis:
    container_name: xunfang-redis
    image: redis
    build:
      context: ./redis
    ports:
      - "6379:6379"
    volumes:
      - ./redis/conf/redis.conf:/home/xunfang/redis/redis.conf
      - ./redis/data:/data
    command: redis-server /home/xunfang/redis/redis.conf
  xunfang-nginx:
    container_name: xunfang-nginx
    image: nginx
    build:
      context: ./nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/html/dist:/home/xunfang/projects/xunfang-ui
      - ./nginx/conf/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/logs:/var/log/nginx
      - ./nginx/conf.d:/etc/nginx/conf.d
    depends_on:
      - xunfang-gateway
    links:
      - xunfang-gateway
  xunfang-gateway:
    container_name: xunfang-gateway
    build:
      context: ./xunfang/gateway
      dockerfile: dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - xunfang-redis
    links:
      - xunfang-redis
  xunfang-auth:
    container_name: xunfang-auth
    build:
      context: ./xunfang/auth
      dockerfile: dockerfile
    ports:
      - "9200:9200"
    depends_on:
      - xunfang-redis
    links:
      - xunfang-redis
  xunfang-modules-system:
    container_name: xunfang-modules-system
    build:
      context: ./xunfang/modules/system
      dockerfile: dockerfile
    ports:
      - "9201:9201"
    depends_on:
      - xunfang-redis
      - xunfang-mysql
    links:
      - xunfang-redis
      - xunfang-mysql
  xunfang-modules-gen:
    container_name: xunfang-modules-gen
    build:
      context: ./xunfang/modules/gen
      dockerfile: dockerfile
    ports:
      - "9202:9202"
    depends_on:
      - xunfang-mysql
    links:
      - xunfang-mysql
  xunfang-modules-job:
    container_name: xunfang-modules-job
    build:
      context: ./xunfang/modules/job
      dockerfile: dockerfile
    ports:
      - "9203:9203"
    depends_on:
      - xunfang-mysql
    links:
      - xunfang-mysql
  xunfang-modules-file:
    container_name: xunfang-modules-file
    build:
      context: ./xunfang/modules/file
      dockerfile: dockerfile
    ports:
      - "9300:9300"
    volumes:
    - ./xunfang/uploadPath:/home/xunfang/uploadPath
  xunfang-visual-monitor:
    container_name: xunfang-visual-monitor
    build:
      context: ./xunfang/visual/monitor
      dockerfile: dockerfile
    ports:
      - "9100:9100"
