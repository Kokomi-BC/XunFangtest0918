# Tomcat
server:
  port: 9205
  tomcat:
    max-http-form-post-size: 10MB
    max-swallow-size: 10MB
    max-http-header-size: 16KB
  max-http-header-size: 16KB

# Spring
spring:
  application:
    name: xunfang-manufacture
  profiles:
    active: dev
  cloud:
    nacos:
      discovery:
        server-addr: 127.0.0.1:8848
      config:
        server-addr: 127.0.0.1:8848
        file-extension: yml
        shared-configs:
          - application-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension}
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  redis:
    host: localhost
    port: 6379
    password: 123456
